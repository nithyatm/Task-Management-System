<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow Pro – Login</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>Task<span>Flow</span> Pro</h1>
      <p>Sign in to your workspace</p>
    </div>
    <div class="alert alert-error" id="errorMsg"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="auth-link">Don't have an account? <a href="/pages/register.html">Register here</a></div>
    <div class="auth-link" style="margin-top:16px;padding-top:16px;border-top:1px solid #eee;font-size:12px;color:#999;">
      Demo: admin@taskflow.com / password
    </div>
  </div>
</div>
<script src="/assets/js/icons.js"></script>
<script src="/assets/js/api.js"></script>
<script>
  requireGuest();
  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const err = document.getElementById('errorMsg');
    const btn = document.getElementById('loginBtn');
    err.style.display = 'none';
    if (!email || !password) { err.textContent = 'Please enter email and password'; err.style.display = 'block'; return; }
    btn.textContent = 'Signing in...'; btn.disabled = true;
    try {
      const data = await api.post('/auth/login', { email, password });
      localStorage.setItem('tf_token', data.token);
      localStorage.setItem('tf_user', JSON.stringify(data.user));
      window.location.href = data.user.role === 'admin' ? '/pages/admin-dashboard.html' : '/pages/dashboard.html';
    } catch (e) {
      err.textContent = e.message; err.style.display = 'block';
      btn.textContent = 'Sign In'; btn.disabled = false;
    }
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
