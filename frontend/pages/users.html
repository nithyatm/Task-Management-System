<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users — TaskFlow Pro</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
<div class="app-wrapper" id="app"></div>
<div id="toast-container" class="toast-container"></div>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/sidebar.js"></script>
<script>
  if (!Auth.isAdmin()) { Toast.error('Admin only'); setTimeout(() => window.location.href = '/frontend/pages/dashboard.html', 1000); }
  Sidebar.init('users', '👤 User Management', 'View and manage all registered users');

  async function init() {
    document.getElementById('page-body').innerHTML = `
      <div class="card">
        <div class="card-header">
          <span style="font-size:20px">👥</span>
          <span class="card-title">All Users</span>
          <div style="margin-left:auto;display:flex;gap:10px">
            <div class="search-bar" style="width:220px">
              <span>🔍</span>
              <input type="text" placeholder="Search users..." oninput="filterUsers(this.value)">
            </div>
            <select class="filter-select" onchange="filterByRole(this.value)">
              <option value="">All Roles</option>
              <option value="admin">Admin</option>
              <option value="manager">Manager</option>
              <option value="member">Member</option>
            </select>
          </div>
        </div>
        <div class="table-container">
          <table>
            <thead><tr>
              <th>User</th><th>Email</th><th>Role</th>
              <th>Status</th><th>Joined</th><th>Actions</th>
            </tr></thead>
            <tbody id="users-tbody">
              <tr><td colspan="6" style="text-align:center;padding:40px;color:#aaa">Loading users...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    `;
    await loadUsers();
  }

  let allUsers = [];

  async function loadUsers() {
    const data = await api('/users');
    if (!data || !data.success) return;
    allUsers = data.users;
    renderUsers(allUsers);
  }

  function renderUsers(users) {
    const tbody = document.getElementById('users-tbody');
    if (!users.length) { tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:#aaa">No users found</td></tr>`; return; }
    const currentUser = Auth.getUser();
    tbody.innerHTML = users.map(u => `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="avatar" style="background:${getAvatarColor(u.name)}">${getInitials(u.name)}</div>
            <div>
              <div style="font-weight:700">${u.name} ${u.id === currentUser?.id ? '<span class="badge" style="background:#e8f4f8;color:#2980b9;font-size:10px">You</span>' : ''}</div>
            </div>
          </div>
        </td>
        <td>${u.email}</td>
        <td>
          <select class="filter-select badge-${u.role}" style="padding:4px 8px;border-radius:6px;font-size:12px;font-weight:700;border:1.5px solid #dee2e6" onchange="updateRole(${u.id}, this.value)">
            <option value="member" ${u.role==='member'?'selected':''}>Member</option>
            <option value="manager" ${u.role==='manager'?'selected':''}>Manager</option>
            <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
          </select>
        </td>
        <td>
          <span class="badge ${u.is_active ? 'badge-done' : 'badge-high'}">${u.is_active ? '✅ Active' : '❌ Inactive'}</span>
        </td>
        <td style="color:var(--gray-600)">${DateUtils.format(u.created_at)}</td>
        <td>
          <div style="display:flex;gap:6px">
            <button class="btn btn-sm ${u.is_active ? 'btn-secondary' : 'btn-success'}" onclick="toggleStatus(${u.id}, ${u.is_active})">
              ${u.is_active ? 'Deactivate' : 'Activate'}
            </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function filterUsers(search) {
    const q = search.toLowerCase();
    renderUsers(allUsers.filter(u => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)));
  }

  function filterByRole(role) {
    renderUsers(role ? allUsers.filter(u => u.role === role) : allUsers);
  }

  async function updateRole(id, role) {
    const data = await api(`/users/${id}`, { method: 'PUT', body: JSON.stringify({ role }) });
    if (data && data.success) Toast.success(`Role updated to ${role}`);
    else Toast.error('Failed to update role');
  }

  async function toggleStatus(id, currentStatus) {
    const newStatus = currentStatus ? 0 : 1;
    const data = await api(`/users/${id}`, { method: 'PUT', body: JSON.stringify({ is_active: newStatus }) });
    if (data && data.success) {
      Toast.success(newStatus ? 'User activated' : 'User deactivated');
      await loadUsers();
    } else Toast.error('Failed to update status');
  }

  init();
</script>
</body>
</html>
