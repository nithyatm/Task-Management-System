<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – TaskFlow Pro</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo"><h1>Task<span>Flow</span> Pro</h1><p>Create your account</p></div>
    <div class="alert alert-error" id="errorMsg"></div>
    <div class="alert alert-success" id="successMsg"></div>
    <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="John Doe" /></div>
    <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="you@example.com" /></div>
    <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Min 6 characters" /></div>
    <div class="form-group">
      <label>Role</label>
      <select id="role">
        <option value="viewer">Viewer</option>
        <option value="task_manager">Task Manager</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <button class="btn btn-primary" id="regBtn" onclick="doRegister()">✅ Create Account</button>
    <div class="auth-link">Already have an account? <a href="/index.html">Sign in</a></div>
  </div>
</div>
<script src="/assets/js/api.js"></script>
<script>
  requireGuest();
  async function doRegister() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const role = document.getElementById('role').value;
    const err = document.getElementById('errorMsg');
    const succ = document.getElementById('successMsg');
    const btn = document.getElementById('regBtn');
    err.style.display = 'none'; succ.style.display = 'none';
    if (!name || !email || !password) { err.textContent = 'All fields are required'; err.style.display = 'block'; return; }
    if (password.length < 6) { err.textContent = 'Password must be at least 6 characters'; err.style.display = 'block'; return; }
    btn.textContent = 'Creating...'; btn.disabled = true;
    try {
      const data = await api.post('/auth/register', { name, email, password, role });
      localStorage.setItem('tf_token', data.token);
      localStorage.setItem('tf_user', JSON.stringify(data.user));
      succ.textContent = 'Account created! Redirecting...'; succ.style.display = 'block';
      setTimeout(() => window.location.href = data.user.role === 'admin' ? '/pages/admin-dashboard.html' : '/pages/dashboard.html', 1000);
    } catch (e) {
      err.textContent = e.message; err.style.display = 'block';
      btn.textContent = '✅ Create Account'; btn.disabled = false;
    }
  }
</script>
</body>
</html>
